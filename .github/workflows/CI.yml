name: Searchable.PostgreSQL CI Pipeline

on:
  push:
    branches: [ master, develop ]
    paths-ignore:
      - README.md
      - .gitignore
  pull_request:
    branches: [ master, develop ]
    paths-ignore:
      - README.md
      - .gitignore
  workflow_dispatch:

permissions:
  contents: read
  checks: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore

    - name: Test with coverage
      run: dotnet test Searchable.PostgreSQL.UnitTests/Searchable.PostgreSQL.UnitTests.csproj --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx" --collect:"XPlat Code Coverage" --results-directory ./TestResults

    - name: Generate test report
      uses: dorny/test-reporter@v3
      if: success() || failure()
      with:
        name: xUnit Tests
        path: 'TestResults/**/*.trx'
        reporter: dotnet-trx
        fail-on-error: false

    - name: Upload coverage reports
      uses: codecov/codecov-action@v7
      with:
        directory: ./TestResults
        fail_ci_if_error: false
        verbose: true

    - name: Upload test results as artifacts
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: test-results
        path: ./TestResults
        retention-days: 30
